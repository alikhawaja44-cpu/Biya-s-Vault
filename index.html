<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biya’s Vault | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #4c0519; margin: 0; overflow: hidden; }
        .pink-glow { text-shadow: 0 0 10px rgba(244, 114, 182, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const BiyasVault = () => {
            const [pin, setPin] = useState("");
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [balance, setBalance] = useState(2500);

            // This ensures icons update every time the screen changes
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [isAuthenticated, pin]);

            const handleKeyPress = (num) => {
                if (pin.length < 4) setPin(prev => prev + num);
            };

            const handleDelete = () => {
                setPin(prev => prev.slice(0, -1));
            };

            useEffect(() => {
                if (pin.length === 4) {
                    if (pin === "2024") { 
                        setIsAuthenticated(true);
                    } else {
                        setPin("");
                        alert("Access Denied: Incorrect PIN");
                    }
                }
            }, [pin]);

            const handleLogout = () => {
                setIsAuthenticated(false);
                setPin("");
            };

            // --- AUTHENTICATED DASHBOARD VIEW ---
            if (isAuthenticated) {
                return (
                    <div className="min-h-screen bg-rose-950 flex flex-col items-center justify-center p-4 text-white">
                        <div className="w-full max-w-sm bg-rose-900/40 rounded-3xl p-8 border border-pink-500/30 shadow-2xl backdrop-blur-md">
                            <div className="flex justify-between items-start mb-8">
                                <div>
                                    <p className="text-pink-200/70 text-sm">Welcome back, Biya</p>
                                    <h2 className="text-2xl font-bold pink-glow">Safe Deposit</h2>
                                </div>
                                <button onClick={handleLogout} className="p-2 bg-rose-800/50 rounded-full hover:bg-pink-600 transition-colors">
                                    <i data-lucide="log-out" className="w-5 h-5"></i>
                                </button>
                            </div>

                            <div className="bg-gradient-to-br from-pink-500 to-rose-600 rounded-2xl p-6 mb-6 shadow-lg shadow-pink-500/40">
                                <div className="flex items-center gap-2 mb-1">
                                    <i data-lucide="wallet" className="w-4 h-4"></i>
                                    <span className="text-pink-50 text-sm font-medium">Vault Balance</span>
                                </div>
                                <h1 className="text-4xl font-bold">${balance.toLocaleString()}</h1>
                            </div>

                            <div className="space-y-3">
                                <button className="w-full py-4 bg-white/10 rounded-xl font-bold hover:bg-white/20 transition-all border border-white/5">
                                    Withdraw
                                </button>
                                <button 
                                    onClick={() => setBalance(prev => prev + 100)} 
                                    className="w-full py-4 bg-pink-500 rounded-xl font-bold hover:bg-pink-400 active:scale-95 transition-all shadow-md"
                                >
                                    Add Funds ($100)
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- LOGIN VIEW ---
            return (
                <div className="min-h-screen bg-rose-950 flex flex-col items-center justify-center p-4 text-white">
                    <div className="mb-8 text-center">
                        <div className="w-20 h-20 bg-pink-500 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-pink-500/30 border border-pink-400/50">
                            <i data-lucide="heart" fill="white" className="w-10 h-10"></i>
                        </div>
                        <h1 className="text-3xl font-extrabold tracking-tight pink-glow">Biya’s Vault</h1>
                        <p className="text-pink-200/60 text-sm mt-2 font-medium">Enter PIN to Unlock</p>
                    </div>

                    <div className="flex gap-4 mb-10">
                        {[0, 1, 2, 3].map((i) => (
                            <div key={i} className={`w-4 h-4 rounded-full transition-all duration-300 border ${
                                i < pin.length 
                                ? "bg-pink-400 border-pink-300 scale-125 shadow-[0_0_1
