<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biya’s Pro Vault | Multi-Bank Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #4c0519; color: white; margin: 0; }
        .pink-glow { text-shadow: 0 0 15px rgba(244, 114, 182, 0.6); }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ec4899; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen bg-rose-950 flex flex-col items-center justify-center p-4">

    <div id="login-view" class="flex flex-col items-center justify-center w-full max-w-sm">
        <div class="mb-8 text-center">
            <div class="w-20 h-20 bg-pink-500 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-pink-500/40 border border-pink-400/50">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="white"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
            </div>
            <h1 class="text-4xl font-extrabold pink-glow">Biya’s Vault</h1>
        </div>
        <div class="flex gap-4 mb-10" id="pin-indicators">
            <div class="pin-dot w-4 h-4 rounded-full bg-rose-900 border border-rose-800"></div>
            <div class="pin-dot w-4 h-4 rounded-full bg-rose-900 border border-rose-800"></div>
            <div class="pin-dot w-4 h-4 rounded-full bg-rose-900 border border-rose-800"></div>
            <div class="pin-dot w-4 h-4 rounded-full bg-rose-900 border border-rose-800"></div>
        </div>
        <div class="grid grid-cols-3 gap-4 w-full max-w-xs" id="keypad">
            </div>
    </div>

    <div id="dashboard-view" class="hidden w-full max-w-6xl my-4 space-y-6">
        
        <div class="flex justify-between items-center bg-rose-900/40 p-6 rounded-3xl border border-pink-500/20 backdrop-blur-md">
            <h2 class="text-2xl font-bold pink-glow">Biya's Financial Hub</h2>
            <div class="flex gap-3">
                <button onclick="showSection('settings')" class="p-2 bg-rose-800 rounded-xl hover:bg-pink-600 transition-all">Settings</button>
                <button onclick="logout()" class="p-2 bg-pink-600 rounded-xl font-bold">Lock</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="space-y-6">
                <div class="bg-gradient-to-br from-pink-500 to-rose-600 rounded-3xl p-6 shadow-xl">
                    <p class="text-pink-100 text-sm">Total Combined Balance</p>
                    <h1 class="text-4xl font-black" id="total-balance">$0.00</h1>
                </div>

                <div class="bg-rose-900/40 rounded-3xl p-6 border border-rose-800/60">
                    <h3 class="font-bold mb-4 flex justify-between">My Banks <button onclick="addBank()" class="text-pink-400 text-xs text-right">+ Add Bank</button></h3>
                    <div id="bank-list" class="space-y-3">
                        </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-rose-900/40 rounded-3xl p-6 border border-rose-800/60">
                    <h3 class="font-bold mb-4">New Entry</h3>
                    <input type="text" id="tx-desc" placeholder="Description" class="w-full bg-rose-950/50 p-3 rounded-xl mb-3 border border-rose-700 outline-none">
                    <input type="number" id="tx-amount" placeholder="Amount ($)" class="w-full bg-rose-950/50 p-3 rounded-xl mb-3 border border-rose-700 outline-none">
                    
                    <p class="text-xs text-pink-300 mb-1 ml-1">Source Account:</p>
                    <select id="tx-bank-select" class="w-full bg-rose-950/50 p-3 rounded-xl mb-4 border border-rose-700 outline-none">
                        </select>

                    <div class="flex gap-3">
                        <button onclick="processTx('income')" class="flex-1 bg-green-600 p-3 rounded-xl font-bold">Credit (+)</button>
                        <button onclick="processTx('expense')" class="flex-1 bg-red-600 p-3 rounded-xl font-bold">Debit (-)</button>
                    </div>
                </div>

                <div class="bg-rose-900/40 rounded-3xl p-6 border border-rose-800/60">
                    <h3 class="font-bold mb-3">Secure Notes</h3>
                    <textarea id="secure-notes" oninput="saveNotes()" rows="4" class="w-full bg-rose-950/50 p-3 rounded-xl text-xs border border-rose-700 outline-none resize-none"></textarea>
                </div>
            </div>

            <div class="bg-rose-900/40 rounded-3xl p-6 border border-rose-800/60 flex flex-col h-[600px]">
                <h3 class="font-bold mb-4">Live Ledger</h3>
                <div id="tx-history" class="flex-1 overflow-y-auto space-y-3 pr-2"></div>
                <button onclick="clearAll()" class="mt-4 text-[10px] text-rose-500 hover:text-white uppercase tracking-widest">Reset All Data</button>
            </div>
        </div>
    </div>

    <div id="settings-view" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-rose-900 w-full max-w-sm rounded-3xl p-8 border border-pink-500/30">
            <h2 class="text-2xl font-bold mb-6">Security Settings</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-pink-300">Change 4-Digit PIN</label>
                    <input type="password" id="new-pin" maxlength="4" placeholder="Enter New PIN" class="w-full bg-rose-950 p-3 rounded-xl mt-1 border border-rose-700 outline-none">
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="updatePin()" class="flex-1 bg-pink-600 p-3 rounded-xl font-bold">Update PIN</button>
                    <button onclick="showSection('dashboard')" class="flex-1 bg-rose-800 p-3 rounded-xl font-bold">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPinAttempt = "";
        
        let vault = JSON.parse(localStorage.getItem('biya_vault_v3')) || {
            pin: "2024",
            banks: [{ name: "Main Vault", balance: 1000 }],
            transactions: [],
            notes: ""
        };

        const pinDots = document.querySelectorAll('.pin-dot');

        // --- AUTH ---
        function pressKey(n) {
            if (currentPinAttempt.length < 4) {
                currentPinAttempt += n;
                updateDots();
                if (currentPinAttempt.length === 4) {
                    if (currentPinAttempt === vault.pin) login();
                    else { alert("Wrong PIN"); currentPinAttempt = ""; updateDots(); }
                }
            }
        }

        function updateDots() {
            pinDots.forEach((d, i) => d.className = i < currentPinAttempt.length ? "pin-dot w-4 h-4 rounded-full bg-pink-500 scale-125 shadow-lg" : "pin-dot w-4 h-4 rounded-full bg-rose-900");
        }

        function login() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            render();
        }

        function logout() { location.reload(); }

        // --- CORE LOGIC ---
        function render() {
            const total = vault.banks.reduce((acc, b) => acc + b.balance, 0);
            document.getElementById('total-balance').innerText = `$${total.toLocaleString()}`;
            
            // Render Banks
            const bl = document.getElementById('bank-list');
            const bs = document.getElementById('tx-bank-select');
            bl.innerHTML = ""; bs.innerHTML = "";
            
            vault.banks.forEach((b, i) => {
                bl.innerHTML += `<div class="flex justify-between items-center bg-rose-950/40 p-3 rounded-xl border border-rose-800">
                    <span class="text-sm font-bold text-pink-200">${b.name}</span>
                    <span class="font-mono text-xs">$${b.balance.toLocaleString()}</span>
                </div>`;
                bs.innerHTML += `<option value="${i}">${b.name} ($${b.balance})</option>`;
            });

            // Render History
            const hl = document.getElementById('tx-history');
            hl.innerHTML = vault.transactions.length ? "" : "<p class='text-center text-xs text-rose-500 pt-10'>No history yet</p>";
            vault.transactions.slice().reverse().forEach(t => {
                const color = t.type === 'income' ? 'text-green-400' : 'text-red-400';
                hl.innerHTML += `<div class="bg-rose-900/20 p-3 rounded-xl border border-rose-800 text-[11px]">
                    <div class="flex justify-between font-bold"><span>${t.desc}</span><span class="${color}">${t.type === 'income' ? '+' : '-'}$${t.amount}</span></div>
                    <div class="flex justify-between text-[9px] opacity-50 mt-1"><span>${t.bank}</span><span>${t.date}</span></div>
                </div>`;
            });

            document.getElementById('secure-notes').value = vault.notes;
            localStorage.setItem('biya_vault_v3', JSON.stringify(vault));
        }

        function addBank() {
            const name = prompt("Enter Bank Name:");
            const bal = parseFloat(prompt("Initial Balance:"));
            if (name && !isNaN(bal)) {
                vault.banks.push({ name, balance: bal });
                render();
            }
        }

        function processTx(type) {
            const desc = document.getElementById('tx-desc').value;
            const amt = parseFloat(document.getElementById('tx-amount').value);
            const bankIdx = document.getElementById('tx-bank-select').value;

            if (!desc || isNaN(amt) || bankIdx === "") return;

            if (type === 'income') vault.banks[bankIdx].balance += amt;
            else {
                if (vault.banks[bankIdx].balance < amt) return alert("Insufficient Funds in this bank!");
                vault.banks[bankIdx].balance -= amt;
            }

            vault.transactions.push({
                desc, amount: amt, type, bank: vault.banks[bankIdx].name, date: new Date().toLocaleDateString()
            });

            document.getElementById('tx-desc').value = "";
            document.getElementById('tx-amount').value = "";
            render();
        }

        function saveNotes() { vault.notes = document.getElementById('secure-notes').value; localStorage.setItem('biya_vault_v3', JSON.stringify(vault)); }

        function showSection(s) {
            document.getElementById('settings-view').className = s === 'settings' ? 'fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-50' : 'hidden';
        }

        function updatePin() {
            const np = document.getElementById('new-pin').value;
            if (np.length === 4) {
                vault.pin = np;
                alert("PIN Updated Successfully!");
                showSection('dashboard');
                localStorage.setItem('biya_vault_v3', JSON.stringify(vault));
            } else alert("PIN must be 4 digits");
        }

        function clearAll() { if(confirm("Wipe everything?")) { localStorage.removeItem('biya_vault_v3'); location.reload(); } }

        // Generate Keypad
        const kp = document.getElementById('keypad');
        [1,2,3,4,5,6,7,8,9,0].forEach(n => {
            const b = document.createElement('button');
            b.innerText = n;
            b.className = "h-16 rounded-2xl bg-rose-900/60 text-2xl font-bold border border-rose-800 hover:bg-pink-500 transition-all active:scale-90";
            b.onclick = () => pressKey(n);
            kp.appendChild(b);
        });
    </script>
</body>
</html>
